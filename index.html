<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Outfit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">Daily Outfit</h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <span id="theme-icon">&#9790;</span>
    </button>
  </header>

  <main>
    <section id="hero" class="hero">
      <h2 class="section-title">Today's Suggestion</h2>
      <div class="hero-layout">
        <aside class="hero-controls">
          <div class="wardrobe-actions">
            <span class="shuffle-label">Wardrobe</span>
            <div class="wardrobe-switch" role="group" aria-label="Choose wardrobe">
              <button class="wardrobe-btn" data-gender="female">Women</button>
              <button class="wardrobe-btn" data-gender="male">Men</button>
            </div>
          </div>
          <div class="hero-actions">
            <button id="worn-btn" class="btn-worn" aria-label="Mark as worn today">
              ○  Wear Today?
            </button>
          </div>
          <div class="shuffle-actions">
            <span class="shuffle-label">Shuffle</span>
            <div class="shuffle-buttons">
              <button class="btn-shuffle" data-shuffle-count="2" aria-label="Shuffle among 2-piece outfits">
                &#8635; 2-Piece
              </button>
              <button class="btn-shuffle" data-shuffle-count="3" aria-label="Shuffle among 3-piece outfits">
                &#8635; 3-Piece
              </button>
              <button class="btn-shuffle" data-shuffle-count="all" aria-label="Shuffle among all outfits">
                &#8635; All Outfits
              </button>
            </div>
          </div>
          <a href="collection.html" class="browse-link">Browse Full Collection &rarr;</a>
        </aside>
        <div class="outfit-card outfit-card--hero">
          <div class="outfit-card__image-wrap">
            <img id="hero-image" class="outfit-card__image" src="" alt="Today's outfit suggestion">
          </div>
          <div class="outfit-card__info">
            <p class="outfit-card__palette" id="hero-palette"></p>
            <p class="outfit-card__rationale" id="hero-rationale"></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Curated outfits &middot; styled with care</p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
